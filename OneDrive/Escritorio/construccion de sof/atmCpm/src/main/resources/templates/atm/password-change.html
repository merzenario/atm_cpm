<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Cambiar Clave 🔐</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
        integrity="sha384-k6RqeWeci5ZR/Lv4MR0sA0FfDOMt23cez/3paNdF+e4z5l5a5b5d5b5d5b5d5b5" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <h2><i class="fas fa-key"></i>Cambiar Clave</h2>

        <form method="post" th:action="@{/atm/change-password}">
            <div class="form-group">
                <label><i class="fas fa-lock"></i>Clave Actual: </label>
                <input type="password" name="currentPassword" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock-open"></i>Nueva Clave: </label>
                <input type="password" name="newPassword" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-check-circle"></i>Confirmar Nueva Clave: </label>
                <input type="password" name="confirmNewPassword" required>
            </div>

            <button type="submit">Cambiar Clave</button>
        </form>

        <p th:if="${message}" class="message-exito" th:text="${message}"></p>
        <p th:if="${error}" class="message-error" th:text="${error}"></p>

        <a th:href="@{/atm/menu}" class="btn-secondary"><i class="fas fa-arrow-left"></i> Volver al menu</a>

    </div>

</body>

</html>
