<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta 🏧</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/src/main/resources/static/styles/admin.css">
</head>

<body>
    <div class="admin-container">
        <h2><i class="fas fa-credit-card"></i>Crear Cuenta</h2>

        <form th:action="@{/admin/create-account}" method="post" th:object="${account}">
            <div class="form-group">
                <label><i class="fas fa-user-tie"></i>Identificacion Cliente: </label>
                <input type="text" th:field="*{}" name="number" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-hashtag"></i>Numero de Cuenta: </label>
                <input type="text" th:field="*{}" name="identification" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-list-alt"></i>Tipo de Cuenta: </label>
                <select name="type">
                    <option value="SAVINGS">Ahorros</option>
                    <option value="CURRENT">Corriente</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-coins"></i>Saldo Inicial: </label>
                <input type="number" name="balance" required>
            </div>

            <button type="submit" class="admin-btn">
                <i class="fas fa-save"></i> Crear Cuenta
            </button>
        </form>

        <div th:if="$[message]" th:text="${message}" th:class="${error} ? 'message error': 'message success'"></div>

        <a th:href="@{/admin}" class="back-btn"><i class="fas fa-arrow-left"></i>Volver</a>
    </div>

</body>

</html>
