<!DOCTYPE html>
<html lang="en">

<head>
    <title>Tus Cuentas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <div class="container">
        <h2><i class="fas fa-wallet"></i>Tus Cuentas</h2>

        <ul class="account-list">
            <li th:each="acoount : ${accounts}">
                <span>
                    <i class="fas fa-credit-card"></i>
                    <span th:text="${acoount.number}"></span>
                    <span th:text="${#numbers.formatDecimal(cuenta.saldo, 1, 2)}"></span>
                </span>
                <a th:href="@{'/atm/motion/' + ${account.number}}" class="btn-secondary">
                    <i class="fas fa-list"></i> Movimientos
                </a>
            </li>
        </ul>

        <a th:href="@/atm/menu" class="btn-secondary"><i fas fa-arrow-left></i>Volver al menu</a>

    </div>

</body>

</html>
