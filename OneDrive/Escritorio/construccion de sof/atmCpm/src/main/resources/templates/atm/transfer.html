<!DOCTYPE html>
<html lang="en">

<head>
    <title>Transferencia💸</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script th:inline="javascript">
        function searchHolder() {
            const accountNumber = document.getElementById("accountNumberDestination").value;
            if (accountNumber.length < 5) return;

            document.getElementById("holderInfo").textContent = "Buscando...";

            fetch('/atm/holder?number=${accountNumber}')
                .then(response => response.json())
                .then(data => { const info = data.name ? `Holder: ${data.name}` : "Cuenta no encontrada"; document.getElementById("holderInfo").textContent = info; })
                .catch(() => { document.getElementById("holderInfo").textContent = "Error al buscar el titular"; });
        }
    </script>

</head>

<body>
    <div class="container">
        <h2><i class="fas fa-exchange-alt"></i>Transferir dinero</h2>

        <form th:action="@{/atm/transfer}" method="post">
            <div class="form-group">
                <label for="accountNumberDestination"><i class="fas fa-credit-card"></i>Numero de cuenta destino:
                </label>
                <input type="text" id="accountNumberDestination" name="accountNumberDestination" required
                    onblur="searchHolder()">
                <span id="holderInfo" class="info-text"></span>
            </div>

            <div class="form-group">
                <label for="amount"><i class="fas fa-money-bill-wave"></i>Monto a transferir: </label>
                <input type="number" id="amount" name="amount" step="0.01" min="1" required>
            </div>

            <button type="submit">Transferir</button>

        </form>

        <div th:if="${message}">
            <p class="message-exito" th:text="${message}"></p>
        </div>

        <div th:if="${error}">
            <p class="message-error" th:text="${error}"></p>
        </div>

        <a th:href="@{/atm/menu}" class="btn-secondary"><i class="fas fa-arrow-left"></i> Volver al menú</a>

    </div>

</body>

</html>
