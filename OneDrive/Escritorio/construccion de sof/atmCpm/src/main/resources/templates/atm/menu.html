<!DOCTYPE html>
<html lang="en">

<head>
    <title>Menu🏧</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <h2>Bienvenido, <span th:text="${customer.name}">Cliente</span></h2>

    <div class="menu-grid">
        <a th:href="@{/atm/menu}" class="menu-item">
            <i class="fas fa-university"></i>MI BANCO
        </a>
        <a th:href="@{/atm/withdrawal}" class="menu-item">
            <i class="fas fa-money bill-wave"></i> RETIRO
        </a>
        <a th:href="@{/atm/transfer}" class="menu-item">
            <i class="fas fa-exchange-alt"></i>TRANSFERENCIA
        </a>
        <a th:href="@{/atm/consign}" class="menu-item">
            <i class="fas fa-hand-holding-usd"></i>CONSIGNAR
        </a>
        <a th:href="@{/atm/password-change}" class="menu-item">
            <i class="fas fa-key"></i>CAMBIO DE CLAVE
        </a>
        <a th:href="@{/atm/consult}" class="menu-item">
            <i class="fas fa-search-dollar"></i>CONSULTA
        </a>
    </div>

    <a th:href="@{/cajero/logout}" class="logout-btn">Cerrar Sesion</a>

</body>

</html>
