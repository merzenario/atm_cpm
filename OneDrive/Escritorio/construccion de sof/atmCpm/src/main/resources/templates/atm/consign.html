<!DOCTYPE html>
<html lang="en">

<head>
    <title>Consignacion 💵</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <div class="container">
        <h2><i class="fas fa-hand-holding-usd"></i>Consignar en mi cuenta</h2>

        <form th:action="@{/atm/consign}" method="post">
            <div class="form-group">
                <label for="accountNumber"><i class="fas fa-credit-card"></i>Numero de Cuenta: </label>
                <input type="text" id="accountNumber" name="accountNumber" required>
            </div>

            <div class="form-group">
                <label for="amount"><i class="fas fa-money-bill-wave"></i>Monto a Consignar: </label>
                <input type="number" id="amount" name="amount" step="0.01" min="1" required>
            </div>

            button type="submit">Consignar</button>

        </form>

        <div th:if="${message}">
            <p class="message-success" th:text="${message}"></p>
        </div>


        <div th:if="${error}">
            <p class="message-error" th:text="${error}"></p>
        </div>

        <a th:href="@{/atm/menu}" class="btn-secondary"><i class="fas fa-arrow-left"></i> Volver al menú</a>

    </div>

</body>

</html>
